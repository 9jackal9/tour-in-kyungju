<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 사제동행 힐링캠프 안내</title>
    <style>
        /* 폰트 및 기본 스타일 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FDFBF7; /* 따뜻한 아이보리 배경 */
            color: #3A3A3A;
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* 헤더 배너 */
        .header {
            background-color: #E6ECE9; /* 부드러운 그린 틴트 */
            padding: 35px 20px;
            text-align: center;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .header .school-name {
            font-size: 14px;
            color: #5A7365;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0 0 8px 0;
        }

        .header h1 {
            font-size: 22px;
            color: #2C3E35;
            margin: 0;
            font-weight: 700;
            line-height: 1.4;
        }

        .header .sub-title {
            display: inline-block;
            background-color: #DCA797; /* 감성적인 인디핑크/오렌지 */
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            margin-top: 12px;
        }

        /* 인트로 문구 */
        .intro-text {
            text-align: center;
            font-size: 15px;
            color: #666;
            margin: 30px 10px;
            word-break: keep-all;
        }

        /* 섹션 공통 스타일 */
        h2 {
            font-size: 18px;
            color: #2C3E35;
            border-bottom: 2px solid #E6ECE9;
            padding-bottom: 8px;
            margin-top: 35px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: "🌿";
            margin-right: 8px;
            font-size: 16px;
        }

        /* 리스트 스타일 */
        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-list li {
            padding: 12px 10px;
            border-bottom: 1px solid #F5F5F3;
            display: flex;
            flex-direction: column;
        }

        .info-list .label {
            font-weight: 700;
            color: #5A7365;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .info-list .value {
            font-size: 15px;
            color: #333;
        }

        .info-list .notice {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* 테이블 스타일 */
        .place-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
